<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дни Рождения</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🎉 Именинники</h1>
            <div class="header-buttons">
                <button id="enable-notifications" class="notify-btn">Уведомления (10:00)</button>
                <button id="open-add-modal" class="add-btn">➕ Добавить</button>
            </div>
        </header>
        
        <main>
            <div id="today-container" class="today-box hidden">
                <h2>🎂 Сегодня празднуют:</h2>
                <div id="today-list"></div>
            </div>

            <h2>Ближайшие дни рождения:</h2>
            <div id="birthdays-list" class="list-container"></div>
        </main>
    </div>

    <!-- Модальное окно формы (для добавления и редактирования) -->
    <div id="form-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Добавить именинника</h3>
            <input type="hidden" id="edit-id">
            <div class="input-group">
                <label for="person-name">Имя и фамилия</label>
                <input type="text" id="person-name" placeholder="Например: Иван Иванов">
            </div>
            <div class="input-group">
                <label for="person-date">Дата рождения</label>
                <input type="date" id="person-date">
            </div>
            <div class="modal-actions">
                <button id="close-modal" class="cancel-btn">Отмена</button>
                <button id="save-person" class="save-btn">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
